{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="{% static 'manifest.json' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{% static 'css/receptionist.css' %}" rel="stylesheet">
  <link href="{% static 'accounts/css/auth.css' %}" rel="stylesheet">
  <link href="{% static 'css/network_handler.css' %}" rel="stylesheet">
  {% block extra_css %}{% endblock %}
</head>

<body>
  {% include "includes/network_handler.html" %}
  <div class="auth-page-wrapper">
    <div class="auth-card-container">
      {% block content %}{% endblock %}
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'accounts/js/auth.js' %}"></script>
  <script src="{% static 'js/network_handler.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>

</html>

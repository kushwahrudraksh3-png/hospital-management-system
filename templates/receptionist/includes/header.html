<header class="top-navbar">
    <div class="d-flex align-items-center gap-2">
        <button
            class="btn btn-light btn-icon mobile-toggle"
            data-sidebar-toggle
            aria-label="Toggle navigation"
        >
            <i class="bi bi-list"></i>
        </button>
        <span class="current-date">
            <i class="bi bi-calendar3 me-1"></i>
            <span data-current-date></span>
        </span>
    </div>
    <div class="d-flex align-items-center gap-3">
        <button
            class="btn btn-light btn-icon position-relative"
            aria-label="Notifications"
        >
            <i class="bi bi-bell"></i>
            <span
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
            >
                3
            </span>
        </button>
        <div class="d-flex align-items-center gap-2">
            <span class="user-avatar">{{ request.user.first_name|make_list|first }}{{ request.user.last_name|make_list|first }}</span>
            <span class="user-name fw-semibold small">
                {{ request.user.first_name }} {{ request.user.last_name }}
            </span>
            <i class="bi bi-chevron-down text-muted small"></i>
        </div>
    </div>
</header>

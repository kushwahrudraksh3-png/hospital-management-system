{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lab Dashboard | Vatsalya Shree Hospital</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{% static 'css/receptionist.css' %}" rel="stylesheet">
</head>
<body>
  <div class="d-flex justify-content-center align-items-center vh-100">
    <div class="text-center">
      <span class="d-inline-flex mb-3" style="width:56px;height:56px;border-radius:12px;background:var(--clinic-primary);color:#fff;font-size:1.5rem;align-items:center;justify-content:center;">
        <i class="bi bi-eyedropper"></i>
      </span>
      <h1 class="h4 fw-bold">Lab Administrator Dashboard</h1>
      <p class="text-muted">Vatsalya Shree Hospital</p>
      <p class="text-muted small">Welcome, {{ request.user.first_name }} {{ request.user.last_name }}</p>
      <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary btn-sm mt-2">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% load static %}
<!-- Top Light Navigation Bar -->
<header class="top-navbar">
    <div class="navbar-left">
        <button id="sidebarToggle" class="mobile-toggle" aria-label="Toggle Sidebar">
            <i class="bi bi-list fs-5"></i>
        </button>
        <span class="fw-bold text-dark fs-6">
            {% block breadcrumb %}Dashboard{% endblock %}
        </span>
    </div>
    
    <div class="search-field d-none d-md-block">
        <i class="bi bi-search"></i>
        <input type="text" class="form-control" placeholder="Search OPD, IPD, bills, or medical records..." aria-label="Search">
    </div>
    
    <div class="d-flex align-items-center gap-3">
        <div class="current-date">
            <i class="bi bi-calendar3 text-primary"></i>
            <span>{% now "F j, Y" %}</span>
        </div>
        
        <!-- User Profile Dropdown -->
        <div class="dropdown">
            <button class="btn btn-link p-0 text-decoration-none d-flex align-items-center gap-2 border-0" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="user-avatar">AV</div>
                <div class="d-none d-md-block text-start" style="line-height: 1.2;">
                    <span class="d-block fw-semibold text-dark fs-7">Dr. Adrian Vance</span>
                    <span class="d-block text-muted" style="font-size: 0.7rem;">Super Admin</span>
                </div>
                <i class="bi bi-chevron-down text-muted ms-1" style="font-size: 0.7rem;"></i>
            </button>
            
            <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                <li class="px-3 py-2 border-bottom bg-light">
                    <span class="d-block fw-semibold text-dark fs-7">Dr. Adrian Vance</span>
                    <small class="text-muted" style="font-size: 0.75rem;">adrian.vance@stjude.org</small>
                </li>
                <li>
                    <a href="{% url 'adminpanel:profile' %}" class="dropdown-item py-2 mt-1">
                        <i class="bi bi-person me-2"></i>My Profile
                    </a>
                </li>
                <li>
                    <a href="{% url 'adminpanel:security_settings' %}" class="dropdown-item py-2">
                        <i class="bi bi-shield-lock me-2"></i>Change Password
                    </a>
                </li>
                <li><hr class="dropdown-divider my-1"></li>
                <li>
                    <a href="{% url 'accounts:login' %}" class="dropdown-item py-2 text-danger">
                        <i class="bi bi-box-arrow-right me-2"></i>Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</header>
